# Dependabot configuration for the public QiloBack wrapper repository.
#
# The wrapper code surface is small (one npm package, one pip package,
# a handful of CI workflows) so we batch updates aggressively and keep
# noise low. Security PRs are unbounded and always created.

version: 2
updates:
  # npm wrapper — @delixon/qiloback
  - package-ecosystem: npm
    directory: "/npm/cli"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    labels: ["dependencies", "npm-wrapper"]
    groups:
      npm-minor-and-patch:
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore(npm)"
      include: scope

  # pip wrapper — qiloback-cli
  - package-ecosystem: pip
    directory: "/pip/cli"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    labels: ["dependencies", "pip-wrapper"]
    groups:
      pip-minor-and-patch:
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore(pip)"
      include: scope

  # GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels: ["dependencies", "ci"]
    groups:
      actions-minor-and-patch:
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore(ci)"
      include: scope
