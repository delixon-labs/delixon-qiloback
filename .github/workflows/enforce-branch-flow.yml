name: Enforce branch flow

# Internal flow: local -> dev (PR) -> main (PR)
# Exception: release/* branches may go directly into main (signed
# cherry-picks, hotfixes coordinated with qiloback-core, point syncs).
# External: fork -> PR to dev (any branch in the fork) -> dev -> main
# (cut by a maintainer).

on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  check-source-branch:
    name: Verify branch flow
    runs-on: ubuntu-latest
    # head_ref is passed via env var (no string interpolation in the
    # script body): branch names from forks and external contributors
    # are untrusted, and a malicious name could otherwise inject shell
    # commands.
    env:
      HEAD_REF: ${{ github.head_ref }}
      BASE_REF: ${{ github.base_ref }}
    steps:
      - name: PRs to main only from dev or release/*
        if: github.base_ref == 'main'
        run: |
          case "${HEAD_REF}" in
            dev|release/*)
              echo "OK: PR to main comes from '${HEAD_REF}'."
              ;;
            *)
              echo "ERROR: PRs to main must come from 'dev' or 'release/*'."
              echo "Source branch: ${HEAD_REF}"
              echo "Correct flow: local -> dev (PR) -> main (PR)"
              echo "Exception: release/* allowed for signed cherry-picks and hotfixes."
              exit 1
              ;;
          esac

      - name: PRs to dev are welcome from any branch
        if: github.base_ref == 'dev'
        run: |
          echo "OK: PR to dev accepted from '${HEAD_REF}'."
          echo "Contributors (including external forks) may open PRs to dev."
          echo "Maintainers review and decide what gets merged."
