name: Publish pip

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.3.0)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      # `id-token: write` enables OIDC for the PyPI Trusted Publisher.
      # PyPI validates the workflow identity against the publisher
      # configured at
      # https://pypi.org/manage/account/publishing/
      # (delixon-labs/delixon-qiloback + pip-publish.yml + environment
      # production). No long-lived tokens, no rotating secrets, no
      # leak surface.
      #
      # `contents: write` is needed to commit + push the version bump
      # to the repository after a successful publish (see "Commit
      # version bump" below). This keeps pyproject.toml aligned with
      # the version actually published to PyPI.
      id-token: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # ref: local because main is protected (require PR + enforce
          # admins) and the workflow cannot push directly. local is
          # the working branch with no PR restriction. The owner
          # promotes manually local -> dev -> main following the
          # repository's standard flow.
          ref: local
          # fetch-depth: 0 so the subsequent push works (depth=1
          # leaves HEAD detached and refuses pushes).
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.0.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Update version in pyproject.toml
        working-directory: pip/cli
        # The version is passed via env var (not interpolated into the
        # script body) so the input is never substituted literally
        # into Python source.
        env:
          NEW_VERSION: ${{ github.event.inputs.version }}
        run: |
          python - <<'PY'
          import os, pathlib, re, sys
          v = os.environ["NEW_VERSION"]
          if not re.match(r"^[0-9]+(\.[0-9]+)+([.-][a-zA-Z0-9]+)*$", v):
              sys.exit(f"invalid version: {v!r}")
          p = pathlib.Path("pyproject.toml")
          text = p.read_text(encoding="utf-8")
          new = re.sub(
              r'^(version\s*=\s*)"[^"]*"',
              lambda m: f'{m.group(1)}"{v}"',
              text,
              count=1,
              flags=re.MULTILINE,
          )
          if new == text:
              sys.exit("version field not found in pyproject.toml")
          p.write_text(new, encoding="utf-8")
          PY

      - name: Build sdist and wheel
        working-directory: pip/cli
        run: python -m build

      - name: Publish qiloback-cli (OIDC Trusted Publisher)
        # OIDC Trusted Publisher: PyPI validates the workflow identity
        # via a JWT signed by GitHub. No tokens, no rotating secrets.
        # Requires prior configuration at
        # pypi.org/manage/account/publishing/ with:
        #   - Owner: delixon-labs
        #   - Repository: delixon-qiloback
        #   - Workflow: pip-publish.yml
        #   - Environment: production
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.13.0
        with:
          packages-dir: pip/cli/dist

      - name: Commit version bump via REST API (server-signed)
        # If the upload to PyPI succeeded, commit the bumped
        # pyproject.toml to `local` using the GitHub Contents REST API
        # (PUT /repos/{owner}/{repo}/contents/{path}). The endpoint
        # creates the commit server-side and signs it automatically
        # with GitHub's web flow key (B5690EEEBB952194), so it lands
        # already verified and compatible with `required_signatures`
        # on main when promoted.
        #
        # We do not use `git commit` in shell because the runner has
        # no SSH/GPG key configured → unsigned commit → blocked on
        # main.
        #
        # If the upload failed, this step does not run because of the
        # default `if: success()`.
        env:
          REPO: ${{ github.repository }}
          NEW_VERSION: ${{ github.event.inputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FILE_PATH: pip/cli/pyproject.toml
          BRANCH: local
        run: |
          set -euo pipefail
          NEW_CONTENT_B64=$(base64 -w0 < "${FILE_PATH}")
          REMOTE_META=$(gh api "repos/${REPO}/contents/${FILE_PATH}?ref=${BRANCH}")
          CURRENT_SHA=$(echo "${REMOTE_META}" | jq -r '.sha')
          REMOTE_CONTENT_B64=$(echo "${REMOTE_META}" | jq -r '.content' | tr -d '\n' | base64 -d | base64 -w0)
          if [ "${NEW_CONTENT_B64}" = "${REMOTE_CONTENT_B64}" ]; then
            echo "No changes to commit (pyproject.toml already at requested version)."
            exit 0
          fi
          gh api -X PUT "repos/${REPO}/contents/${FILE_PATH}" \
            -f "message=chore(pip): bump qiloback-cli to ${NEW_VERSION} (auto)" \
            -f "content=${NEW_CONTENT_B64}" \
            -f "sha=${CURRENT_SHA}" \
            -f "branch=${BRANCH}"
